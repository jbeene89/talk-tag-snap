<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; width: 1024px; height: 500px; overflow: hidden; }
      body {
        position: relative;
        background: #111;
        color: #fff;
        font-family: Arial, Helvetica, sans-serif;
      }
      .photo {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .shade {
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, rgba(8, 8, 8, .98) 0%, rgba(8, 8, 8, .88) 36%, rgba(8, 8, 8, .12) 70%);
      }
      .copy {
        position: absolute;
        left: 64px;
        top: 62px;
        width: 390px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 24px;
        font-weight: 800;
      }
      .mark {
        display: grid;
        place-items: center;
        width: 44px;
        height: 44px;
        border-radius: 13px;
        background: #3ddc84;
        color: white;
        font-size: 28px;
        font-weight: 900;
      }
      h1 {
        margin: 62px 0 16px;
        font-size: 56px;
        line-height: .93;
        letter-spacing: -3px;
      }
      h1 span { color: #facc15; }
      p {
        margin: 0;
        color: #d4d4d4;
        font-size: 20px;
        line-height: 1.35;
        font-weight: 600;
      }
      .rule {
        width: 74px;
        height: 6px;
        margin-top: 32px;
        border-radius: 6px;
        background: #facc15;
      }
    </style>
  </head>
  <body>
    <img class="photo" src="feature-graphic-background.png" alt="" />
    <div class="shade"></div>
    <main class="copy">
      <div class="brand"><div class="mark">S</div> SoupyTag</div>
      <h1>MAKE PROBLEMS <span>OBVIOUS.</span></h1>
      <p>AI photo tags, clear notes, and share-ready proof.</p>
      <div class="rule"></div>
    </main>
  </body>
</html>
